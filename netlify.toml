[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 16 requires Node 20.9+. Pin so builds don't drift with Netlify's default.
  NODE_VERSION = "22"

# The Next.js runtime (OpenNext adapter) is installed and updated automatically.
# Netlify recommends against pinning it, so no [[plugins]] block here.
